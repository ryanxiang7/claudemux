name: claudemux reset next pre

# After a successful GA on main, bring next back in sync with main's GA state
# and re-enter beta pre mode. This is load-bearing for multi-cycle correctness:
# without it, next keeps its frozen pre-mode base (initialVersions) and the
# already-published fragments, so the next GA would recompute from that stale
# base and re-consume shipped changesets (duplicate changelog, wrong version).
on:
  workflow_run:
    workflows: ["claudemux release main"]
    types: [completed]

concurrency:
  group: claudemux-reset-next-pre

permissions:
  contents: write

env:
  HUSKY: "0"

jobs:
  reset:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Create claudemux release app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDEMUX_RELEASE_APP_ID }}
          private-key: ${{ secrets.CLAUDEMUX_RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          ref: next

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace tooling
        run: pnpm install --frozen-lockfile

      - name: Fast-forward next to main's GA state, re-enter beta pre mode
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git fetch origin main

          # Fast-forward only. next already contains main's history when GA was a
          # next->main promotion, so the only new commit is GA itself and the
          # fast-forward succeeds. If next has diverged and a fast-forward is
          # impossible, fail loudly for a human — never auto-merge or resolve.
          git merge --ff-only origin/main

          # GA deletes pre.json, so after the fast-forward next is out of pre
          # mode. Re-enter beta to resume the prerelease channel from the GA
          # version. If next is somehow already in pre mode, this is a no-op.
          if [ -f .changeset/pre.json ] && [ "$(jq -r '.mode // ""' .changeset/pre.json)" = "pre" ]; then
            echo 'next already in pre mode; nothing to re-enter.'
            exit 0
          fi

          pnpm exec changeset pre enter beta
          v=$(jq -r .version plugins/claudemux/package.json)

          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config user.name 'github-actions[bot]'
          git add .changeset/pre.json
          git diff --staged --quiet && echo 'Nothing to commit.' && exit 0
          git commit -m "chore(release): re-enter beta pre mode (initialVersions=${v})"
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:next
