name: claudemux promote main

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "promote" to confirm'
        required: true
        type: string

concurrency:
  group: claudemux-promote-main

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    if: github.event.inputs.confirm == 'promote'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: next

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace tooling
        run: pnpm install --frozen-lockfile

      - name: Require beta release first
        run: |
          count=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "::error::pending claudemux changesets found; ship the beta first via release-next PR before promoting"
            find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' -print
            exit 1
          fi

      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDEMUX_RELEASE_APP_ID }}
          private-key: ${{ secrets.CLAUDEMUX_RELEASE_APP_PRIVATE_KEY }}

      - name: Promote next to GA
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          pnpm --dir plugins/claudemux version-ga

          v=$(jq -r .version plugins/claudemux/package.json)
          case "$v" in
            *-beta*)
              echo "::error::promote produced beta version $v"
              exit 1
              ;;
          esac

          branch="release/claudemux-ga-$v"
          git config user.name "claudemux-release-bot[bot]"
          git config user.email "claudemux-release-bot[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git"

          git checkout -B "$branch"
          git add -A plugins/claudemux
          git commit -m "chore(release): claudemux $v"
          git push --force-with-lease origin "$branch"

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(release): claudemux $v" \
            --body "Promote next to GA. Drops -beta suffix and resets pre.json."

          gh pr merge --auto --squash "$branch"
