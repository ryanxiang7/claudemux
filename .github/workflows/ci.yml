name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Commit author check
        run: |
          zero=0000000000000000000000000000000000000000
          if [ "${{ github.event_name }}" = pull_request ]; then
            commits=$(git log --format='%H' \
              "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}")
          elif [ "${{ github.event.before }}" = "$zero" ]; then
            commits=$(git log -1 --format='%H' "${{ github.event.after }}")
          else
            commits=$(git log --format='%H' \
              "${{ github.event.before }}..${{ github.event.after }}")
          fi
          fail=0
          while IFS= read -r c; do
            [ -z "$c" ] && continue
            email=$(git log -1 --format='%ae' "$c")
            bin/check-author "$email" || { echo "  ^ in commit $c" >&2; fail=1; }
          done <<< "$commits"
          [ "$fail" = 0 ] || { echo "::error::commit author email check failed"; exit 1; }

      - name: Install tmux + bats + shellcheck (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux bats shellcheck

      - name: Install tmux + bats + shellcheck (macos)
        if: runner.os == 'macOS'
        run: brew install bats-core shellcheck tmux

      - name: Versions
        run: |
          tmux -V
          bats --version
          shellcheck --version | head -2
          bash --version | head -1

      - name: shellcheck
        run: |
          shellcheck \
            plugins/claudemux/bin/tm \
            plugins/claudemux/core/bin/tm \
            plugins/claudemux/core/test/fixtures/fake-tmux-bin/tmux \
            plugins/claudemux/hooks/*.sh \
            plugins/claudemux/scripts/*.sh \
            bin/changeset \
            bin/release \
            bin/check-author \
            .githooks/pre-commit \
            .agents/scripts/check.sh

      - name: agents — KB structural check
        run: bash .agents/scripts/check.sh

      - name: bats — release tooling
        if: hashFiles('tests/cli/*.bats') != ''
        run: bats tests/cli/

  # The feishu-channel plugin is a Node/TypeScript project with its own unit
  # suite. It runs in a separate job so its toolchain stays off the bats +
  # shellcheck lane above. The suite is OS-agnostic TypeScript, so ubuntu alone
  # is enough coverage.
  feishu-channel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/feishu-channel
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Versions
        run: node --version

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # A live check against the real Feishu Open Platform: the credentials
      # mint a tenant_access_token and a WSClient opens the long-lived
      # WebSocket. test/feishu-live.ts is not a *.test.ts file, so `npm test`
      # above never runs it — it runs here, by explicit path, with the app
      # credentials from repository secrets. When the secrets are absent (a
      # fork pull request), the test skips itself rather than failing.
      - name: Live Feishu integration test
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: npx vitest run --config vitest.live.config.ts

  # The orchestration core (the `next` line, 1.0.0-beta.0) is a Node/TypeScript
  # project with its own unit suite. Like feishu-channel it runs in a separate
  # job so its toolchain stays off the bats + shellcheck lane above. It runs
  # on both OSes because the native verbs themselves still shell out to
  # platform-sensitive binaries (`tm states` / `tm history` pipe through
  # `column`; `tm history`'s detail view formats a timestamp with BSD `date
  # -r`, so its detail-mode scenarios are macOS-gated in the harness).
  claudemux-core:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: plugins/claudemux/core
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Native `tm states` and `tm history` pipe through the real `column`
      # binary, and `tm ctx` / `tm history` parse jsonl transcripts as JSON.
      # On Linux those are installed here; the macOS runner ships both in
      # its base image.
      - name: Install jq and column (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq bsdextrautils

      - name: Install dependencies
        run: npm ci

      - name: Versions
        run: node --version

      - name: Type-check
        run: npm run typecheck

      # The codex app-server protocol bindings under `src/codex-protocol/`
      # are emitted by `codex app-server generate-ts --experimental`. They
      # are vendored as ground truth: a codex upgrade that changes the
      # wire schema must regenerate this directory in the same change.
      # The drift gate installs the pinned codex CLI, reruns generate-ts,
      # and asserts `git diff --exit-code` — a feature commit with a
      # protocol drift but no regenerated `codex-protocol/` is the bug.
      #
      # `@openai/codex` ships as a Node-wrapped binary; `npm install -g`
      # is enough on both runners. The version is pinned alongside the
      # vendored output so the gate is deterministic; bumping codex means
      # bumping this line and regenerating in the same PR.
      - name: Install codex CLI
        run: npm install -g '@openai/codex@0.133.0'

      - name: codex-protocol not stale
        # `--experimental` matches how the directory was generated; without
        # it the experimental methods (turn/*, thread/*, etc) would drop
        # out of the output and the diff would always be red.
        run: |
          codex app-server generate-ts --experimental --out src/codex-protocol/
          git diff --exit-code -- src/codex-protocol/

      - name: Build bundle
        # Rebuild `dist/cli.mjs` from current source. The bundle is the
        # production launcher's payload (`plugins/claudemux/bin/tm` execs
        # node against it) and is committed to the repo so a marketplace
        # install needs no `npm install` step. The next step asserts the
        # committed bundle matches the freshly-rebuilt one — a feature
        # commit with no matching `dist/` change is the bug.
        run: npm run build

      - name: dist not stale
        run: git diff --exit-code -- dist/

      - name: Unit tests
        run: npm test
