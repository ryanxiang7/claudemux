name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Commit author check
        run: |
          zero=0000000000000000000000000000000000000000
          if [ "${{ github.event_name }}" = pull_request ]; then
            commits=$(git log --format='%H' \
              "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}")
          elif [ "${{ github.event.before }}" = "$zero" ]; then
            commits=$(git log -1 --format='%H' "${{ github.event.after }}")
          else
            commits=$(git log --format='%H' \
              "${{ github.event.before }}..${{ github.event.after }}")
          fi
          fail=0
          while IFS= read -r c; do
            [ -z "$c" ] && continue
            email=$(git log -1 --format='%ae' "$c")
            bin/check-author "$email" || { echo "  ^ in commit $c" >&2; fail=1; }
          done <<< "$commits"
          [ "$fail" = 0 ] || { echo "::error::commit author email check failed"; exit 1; }

      - name: Install tmux + bats + shellcheck (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux bats shellcheck

      - name: Install tmux + bats + shellcheck (macos)
        if: runner.os == 'macOS'
        run: brew install bats-core shellcheck tmux

      - name: Versions
        run: |
          tmux -V
          bats --version
          shellcheck --version | head -2
          bash --version | head -1

      - name: shellcheck
        run: |
          shellcheck \
            plugins/claudemux/bin/tm \
            plugins/claudemux/core/test/fixtures/fake-tm \
            plugins/claudemux/hooks/*.sh \
            plugins/claudemux/scripts/*.sh \
            bin/changeset \
            bin/release \
            bin/check-author \
            .githooks/pre-commit \
            .agents/scripts/check.sh

      - name: agents — KB structural check
        run: bash .agents/scripts/check.sh

      - name: bats — pure functions
        if: hashFiles('tests/pure/*.bats') != ''
        run: bats tests/pure/

      - name: bats — help snapshots
        if: hashFiles('tests/help/*.bats') != ''
        run: bats tests/help/

      - name: bats — release tooling
        if: hashFiles('tests/cli/*.bats') != ''
        run: bats tests/cli/

  # The feishu-channel plugin is a Bun/TypeScript project with its own unit
  # suite. It runs in a separate job so the Bun toolchain stays off the bats +
  # shellcheck lane above. The suite is OS-agnostic TypeScript, so ubuntu alone
  # is enough coverage.
  feishu-channel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/feishu-channel
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Versions
        run: bun --version

      - name: Type-check
        run: bun run typecheck

      - name: Unit tests
        run: bun test

      # A live check against the real Feishu Open Platform: the credentials
      # mint a tenant_access_token and a WSClient opens the long-lived
      # WebSocket. test/feishu-live.ts is not a *.test.ts file, so `bun test`
      # above never runs it — it runs here, by explicit path, with the app
      # credentials from repository secrets. When the secrets are absent (a
      # fork pull request), the test skips itself rather than failing.
      - name: Live Feishu integration test
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: bun test ./test/feishu-live.ts

  # The orchestration core (the `next` line, 1.0.0-beta.0) is a Bun/TypeScript
  # project with its own unit suite. Like feishu-channel it runs in a separate
  # job so the Bun toolchain stays off the bats + shellcheck lane above. The
  # suite is OS-agnostic TypeScript, so ubuntu alone is enough coverage.
  claudemux-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/claudemux/core
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Versions
        run: bun --version

      - name: Type-check
        run: bun run typecheck

      - name: Unit tests
        run: bun test
