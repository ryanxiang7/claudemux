name: claudemux release next

on:
  push:
    branches: [next]

concurrency:
  group: claudemux-release-next

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: next

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: plugins/claudemux/pnpm-lock.yaml

      - name: Install claudemux release tooling
        run: pnpm --dir plugins/claudemux install --frozen-lockfile

      - name: Version and push if changesets exist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd plugins/claudemux
          # check if there are any changesets to consume
          if [ -z "$(ls .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
            echo 'No changesets found, skipping bump.'
            exit 0
          fi
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config user.name 'github-actions[bot]'
          pnpm version-packages
          git add -A
          git diff --staged --quiet && echo 'Nothing to commit.' && exit 0
          git commit -m 'chore(release): claudemux beta'
          git push
