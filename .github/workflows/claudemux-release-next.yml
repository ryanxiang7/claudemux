name: claudemux release next

on:
  push:
    branches: [next]

concurrency:
  group: claudemux-release-next

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create claudemux release app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDEMUX_RELEASE_APP_ID }}
          private-key: ${{ secrets.CLAUDEMUX_RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          ref: next

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace tooling
        run: pnpm install --frozen-lockfile

      - name: Version and push if changesets exist
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          changed_changesets="$(
            git diff --name-only --diff-filter=A "$PUSH_BEFORE" "$PUSH_SHA" -- '.changeset/*.md' \
              | grep -v '/README.md$' || true
          )"
          if [ -z "$changed_changesets" ]; then
            echo 'No newly added changesets in this push, skipping bump.'
            exit 0
          fi

          node plugins/claudemux/scripts/prepare-prerelease-changesets.mjs $changed_changesets
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config user.name 'github-actions[bot]'
          pnpm --dir plugins/claudemux version-packages
          git add -A
          git diff --staged --quiet && echo 'Nothing to commit.' && exit 0
          git commit -m 'chore(release): claudemux beta'
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:next
